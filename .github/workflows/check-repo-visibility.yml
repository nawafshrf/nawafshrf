name: Check Repository Visibility

on:
  schedule:
    # Runs every day at 8:00 AM UTC
    - cron: '0 8 * * *'
  workflow_dispatch: # Allow manual runs

jobs:
  check-visibility:
    runs-on: ubuntu-latest
    steps:
      - name: Check if repo is private
        id: check
        uses: actions/github-script@v7
        with:
          script: |
            const { data: repo } = await github.rest.repos.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
            });

            console.log(`Repository visibility: ${repo.private ? 'private' : 'PUBLIC'}`);

            if (!repo.private) {
              // Create an issue to alert the owner
              const { data: issues } = await github.rest.issues.listForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                state: 'open',
                labels: 'security-alert',
              });

              const alreadyAlerting = issues.some(i =>
                i.title.includes('Repository is PUBLIC')
              );

              if (!alreadyAlerting) {
                await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: 'SECURITY ALERT: Repository is PUBLIC',
                  body: [
                    '## Your repository is currently PUBLIC',
                    '',
                    'This repository was detected as **public**, which means anyone on the internet can view its contents.',
                    '',
                    '### How to make it private again:',
                    '1. Go to your repository on GitHub',
                    '2. Click **Settings** (top right of the repo)',
                    '3. Scroll down to the **Danger Zone** section',
                    '4. Click **Change visibility** and select **Make private**',
                    '',
                    'This issue was automatically created by the visibility monitoring workflow.',
                  ].join('\n'),
                  labels: ['security-alert'],
                });

                core.setFailed('Repository is PUBLIC! An issue has been created to alert you.');
              }
            } else {
              console.log('Repository is private. All good!');
            }
