      <path d="M1465 1055 L1525 1042" stroke-width="1.2"/>
      <path d="M1530 1035 C1565 1002, 1598 998, 1612 1015 C1602 1035, 1570 1040, 1538 1038"/>
      <path d="M1545 1020 L1602 1010" stroke-width="1.2"/>
