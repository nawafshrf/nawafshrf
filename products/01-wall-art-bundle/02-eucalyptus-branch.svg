          stroke="#6D6244" stroke-width="4"/>

    <!-- Sub-branch 1 - left side, about 1/3 up -->
    <path d="M870 1940 C810 1860, 740 1800, 660 1760"
          stroke="#6D6244" stroke-width="3"/>

    <!-- Sub-branch 2 - right side, about 2/3 up -->
    <path d="M1360 1120 C1430 1060, 1510 1020, 1600 1000"
          stroke="#6D6244" stroke-width="2.5"/>

    <!-- Leaves along main stem - alternating sides, organic shapes -->
    <!-- Leaf pair 1 - bottom -->
    <g stroke="#B1C5A4" stroke-width="2.5">
      <!-- Right leaf -->
      <path d="M620 2580 C680 2520, 740 2500, 780 2520 C760 2560, 700 2580, 640 2580"/>
      <path d="M640 2555 L760 2530" stroke-width="1.5"/>
      <!-- Left leaf -->
      <path d="M600 2570 C540 2510, 490 2500, 460 2520 C480 2560, 530 2575, 580 2570"/>
      <path d="M575 2550 L470 2530" stroke-width="1.5"/>
    </g>

    <!-- Leaf pair 2 -->
    <g stroke="#B1C5A4" stroke-width="2.5">
      <path d="M680 2440 C740 2370, 810 2350, 850 2375 C830 2410, 760 2430, 700 2435"/>
      <path d="M700 2410 L835 2378" stroke-width="1.5"/>
      <path d="M660 2430 C600 2365, 540 2350, 510 2375 C530 2410, 590 2425, 650 2425"/>
      <path d="M645 2405 L520 2378" stroke-width="1.5"/>
    </g>

    <!-- Leaf pair 3 -->
    <g stroke="#B1C5A4" stroke-width="2.5">
      <path d="M760 2280 C825 2210, 895 2190, 935 2215 C915 2250, 845 2270, 780 2275"/>
      <path d="M785 2250 L920 2218" stroke-width="1.5"/>
      <path d="M740 2270 C680 2205, 615 2192, 585 2218 C605 2252, 670 2268, 730 2268"/>
      <path d="M725 2248 L598 2220" stroke-width="1.5"/>
