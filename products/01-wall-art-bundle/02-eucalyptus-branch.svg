<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 2400 3000" width="2400" height="3000">
  <title>Eucalyptus Branch</title>
  <desc>Fine line botanical eucalyptus branch illustration in sage green</desc>

  <!-- Background -->
  <rect width="2400" height="3000" fill="#F0EEE9"/>

  <g stroke-linecap="round" stroke-linejoin="round" fill="none">

    <!-- Main stem - flowing diagonal from bottom-left to upper-right with hand-drawn feel -->
