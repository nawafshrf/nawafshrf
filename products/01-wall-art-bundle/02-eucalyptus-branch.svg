      <path d="M885 2070 L1020 2042" stroke-width="1.5"/>
      <path d="M840 2092 C780 2030, 715 2018, 688 2042 C708 2075, 770 2090, 830 2088"/>
      <path d="M825 2068 L700 2044" stroke-width="1.5"/>
