    <!-- Leaves on sub-branch 1 (left) -->
    <g stroke="#B1C5A4" stroke-width="2.2">
      <path d="M810 1880 C855 1835, 895 1830, 912 1850 C898 1872, 858 1880, 818 1878"/>
      <path d="M825 1860 L902 1845" stroke-width="1.2"/>
      <path d="M798 1878 C758 1838, 718 1835, 705 1855 C718 1875, 752 1880, 792 1878"/>
      <path d="M788 1858 L712 1848" stroke-width="1.2"/>
      <path d="M730 1810 C768 1770, 805 1768, 818 1785 C808 1805, 772 1812, 738 1810"/>
      <path d="M745 1792 L808 1780" stroke-width="1.2"/>
      <path d="M720 1808 C685 1772, 650 1770, 640 1790 C652 1808, 682 1812, 715 1808"/>
      <path d="M710 1790 L648 1782" stroke-width="1.2"/>
