    <!-- Leaf pair 12 - topmost, smallest -->
    <g stroke="#B1C5A4" stroke-width="1.8">
      <path d="M1745 580 C1785 548, 1822 544, 1838 558 C1828 578, 1792 585, 1755 582"/>
