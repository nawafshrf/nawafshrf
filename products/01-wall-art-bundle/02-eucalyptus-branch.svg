    <!-- Small seed pods / buds at branch tips -->
    <g fill="#6D6244" stroke="none" opacity="0.6">
      <circle cx="650" cy="1755" r="5"/>
      <circle cx="1600" cy="995" r="4.5"/>
      <circle cx="1895" cy="332" r="4"/>
    </g>
  </g>
</svg>
