      <path d="M1198 1475 L1322 1452" stroke-width="1.5"/>
      <path d="M1155 1495 C1098 1438, 1038 1430, 1015 1455 C1035 1485, 1092 1498, 1148 1495"/>
      <path d="M1140 1472 L1028 1458" stroke-width="1.5"/>
