<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Japandi Botanical Gallery Wall - Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #E8E0D4;
    font-family: 'Helvetica Neue', Arial, sans-serif;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    padding: 40px;
  }
  .gallery-wall {
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    gap: 40px;
    max-width: 1200px;
  }
  .frame {
    background: white;
    padding: 20px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.12), 0 1px 4px rgba(0,0,0,0.08);
  }
  .frame img {
    width: 100%;
    height: auto;
    display: block;
  }
  h1 {
    grid-column: 1 / -1;
    text-align: center;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: #6D6244;
    margin-bottom: 20px;
  }
  .subtitle {
    grid-column: 1 / -1;
    text-align: center;
    font-size: 11px;
    font-weight: 300;
    letter-spacing: 0.15em;
    color: #8B8B8B;
    margin-top: 10px;
  }
</style>
</head>
<body>
<div class="gallery-wall">
  <h1>Japandi Botanical Gallery Wall Art &mdash; Set of 6</h1>
  <div class="frame"><img src="../01-abstract-botanical.svg" alt="Abstract Botanical Composition"></div>
  <div class="frame"><img src="../02-eucalyptus-branch.svg" alt="Eucalyptus Branch Line Art"></div>
  <div class="frame"><img src="../03-wabi-sabi-arches.svg" alt="Wabi-Sabi Arches"></div>
  <div class="frame"><img src="../04-moon-phases.svg" alt="Moon Phases"></div>
  <div class="frame"><img src="../05-be-still-and-know.svg" alt="Be Still and Know Typography"></div>
  <div class="frame"><img src="../06-constellation-star-map.svg" alt="Orion Constellation Star Map"></div>
  <p class="subtitle">Digital Download &bull; SVG Vector Format &bull; Print at Any Size &bull; Instant Delivery</p>
</div>
</body>
</html>
